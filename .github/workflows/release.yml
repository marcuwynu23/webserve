name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          - os: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
          - os: linux
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: macos
            runner: macos-latest
            target: x86_64-apple-darwin
            ext: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      # Windows Git Bash often has no `zip`; use PowerShell Compress-Archive
      - name: Create archive (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $src = "target/${{ matrix.target }}/release/webserve.exe"
          $zip = "release/webserve-${{ matrix.os }}-${{ matrix.target }}.zip"
          Compress-Archive -LiteralPath $src -DestinationPath $zip -Force
          Write-Host "Created $zip"

      - name: Create archive (Linux / macOS)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          mkdir -p release
          BIN_NAME=webserve
          tar -czf "release/webserve-${{ matrix.os }}-${{ matrix.target }}.tar.gz" -C "target/${{ matrix.target }}/release" "$BIN_NAME"
          echo "Created release/webserve-${{ matrix.os }}-${{ matrix.target }}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webserve-${{ matrix.os }}-${{ matrix.target }}
          path: release/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
